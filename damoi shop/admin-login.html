<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sso Portal | DAMOI ADMIN</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #121212;
            --surface: #ffffff;
            --bg: #f0f2f5;
            --border: #e0e0e0;
            --text-main: #333333;
            --text-muted: #666666;
            --error: #d32f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .auth-container {
            background: var(--surface); 
            width: 100%; 
            max-width: 420px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03); 
            overflow: hidden;
        }

        .auth-header {
            text-align: center;
            padding: 40px 30px 20px;
        }
        
        .sys-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--primary);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 5px;
        }

        .sys-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            background: #eee;
            color: #555;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .auth-body {
            padding: 0 40px 40px;
        }

        .auth-title { 
            font-size: 18px; 
            color: var(--text-main); 
            margin-bottom: 25px; 
            font-weight: 600; 
            text-align: center;
        }

        .form-group { margin-bottom: 20px; text-align: left; position: relative; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-family: inherit; 
            font-size: 14px; 
            background: #fcfcfc;
            transition: all 0.2s ease; 
        }
        .form-group input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: #fff;
            box-shadow: 0 0 0 3px rgba(18, 18, 18, 0.05);
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 36px;
            color: #aaa;
            font-size: 14px;
        }

        .btn-auth {
            background: var(--primary); 
            color: #fff; 
            border: none; 
            width: 100%; 
            padding: 15px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: 600; 
            letter-spacing: 1px;
            cursor: pointer; 
            transition: background 0.2s; 
            font-family: inherit;
        }
        .btn-auth:hover { background: #2a2a2a; }

        .auth-footer {
            text-align: center;
            padding: 20px;
            background: #fafafa;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .error-msg {
            color: var(--error); 
            font-size: 13px; 
            margin-bottom: 15px; 
            display: none; 
            font-weight: 500;
            text-align: center;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
        }

        /* 2FA STYLES */
        #step-2fa { display: none; text-align: center; }
        .totp-icon {
            font-size: 40px;
            color: var(--primary);
            margin-bottom: 15px;
        }
        .totp-instruction {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .totp-input-box {
            letter-spacing: 15px;
            font-size: 24px !important;
            text-align: center;
            font-weight: 700;
            padding: 15px !important;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
        }
        .back-link:hover { color: var(--primary); text-decoration: underline; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-err { animation: shake 0.4s; }

    </style>
</head>
<body>

    <div class="auth-container" id="authBox">
        <div class="auth-header">
            <a href="#" class="sys-logo" style="width: 175px; height: 80px; overflow: hidden; position: relative; display: inline-block; margin-bottom: 5px;">
                <img src="images/logo.png" alt="DAMOI" style="position: absolute; height: 170px; top: 40%; transform: translateY(-50%); left: -70px; mix-blend-mode: darken; pointer-events: none; max-width: none;">
            </a><br>
            <span class="sys-badge">Admin Portal Sso</span>
        </div>

        <div class="auth-body">
            
            <div class="error-msg" id="errorMsg">Thông tin xác thực không đúng.</div>

            <!-- STEP 1: CREDENTIALS -->
            <form id="step-login">
                <div class="auth-title">Đăng nhập Quản Trị</div>
                <div class="form-group">
                    <label>Email nội bộ</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn..." value="" required>
                    <i class="fa-regular fa-envelope input-icon"></i>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>
                <button type="submit" class="btn-auth">TIẾP TỤC</button>
            </form>

            <!-- STEP 2: 2FA MFA -->
            <form id="step-2fa">
                <i class="fa-solid fa-shield-halved totp-icon"></i>
                <div class="auth-title" style="margin-bottom: 5px;">Xác thực 2 lớp (2FA)</div>
                <div class="totp-instruction">
                    Vui lòng mở ứng dụng Google Authenticator trên điện thoại và nhập mã 6 số.
                </div>
                <div class="form-group">
                    <input type="text" id="totp-code" class="totp-input-box" placeholder="------" maxlength="6" autocomplete="off" required>
                </div>
                <button type="submit" class="btn-auth">XÁC MINH & ĐĂNG NHẬP</button>
                <a class="back-link" onclick="goBack()">&larr; Quay lại</a>
            </form>

        </div>
        
        <div class="auth-footer">
            &copy; 2026 Hệ thống nội bộ DAMOI JSC.
        </div>
    </div>

    <script>
        const stepLogin = document.getElementById('step-login');
        const step2fa = document.getElementById('step-2fa');
        const errorMsg = document.getElementById('errorMsg');
        const authBox = document.getElementById('authBox');

        let savedEmail = '';
        let savedPassword = '';

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.style.display = 'block';
            authBox.classList.remove('shake-err');
            void authBox.offsetWidth; // trigger reflow
            authBox.classList.add('shake-err');
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        // STEP 1 SUBMIT
        stepLogin.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;

            try {
                const response = await fetch('/api/users/admin-login/step1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    savedEmail = email;
                    savedPassword = pass;
                    stepLogin.style.display = 'none';
                    step2fa.style.display = 'block';
                    setTimeout(() => document.getElementById('totp-code').focus(), 100);
                } else {
                    showError(data.message || 'Sai Email hoặc mật khẩu!');
                }
            } catch (err) {
                showError('Máy chủ không phản hồi!');
            }
        });

        // STEP 2 SUBMIT
        step2fa.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();

            const code = document.getElementById('totp-code').value.trim();
            
            if (code.length !== 6 || !/^\d+$/.test(code)) {
                showError('Mã xác thực không hợp lệ. Vui lòng nhập 6 chữ số.');
                return;
            }

            try {
                const response = await fetch('/api/users/admin-login/verify2fa', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: savedEmail, password: savedPassword, token: code })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    const authData = {
                        _id: data._id,
                        fullName: data.fullName,
                        email: data.email,
                        role: data.role,
                        loginAt: new Date().toISOString()
                    };

                    sessionStorage.setItem('damoi_user', JSON.stringify(authData));
                    
                    const btn = step2fa.querySelector('button');
                    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ĐANG TẢI...';
                    btn.style.background = '#4CAF50';
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 800);
                } else {
                    showError(data.message || 'Mã xác thực không hợp lệ or đã mốc!');
                }
            } catch (err) {
                showError('Máy chủ từ chối ghép nối Google Authenticator!');
            }
        });

        // BACK TO STEP 1
        function goBack() {
            hideError();
            step2fa.style.display = 'none';
            stepLogin.style.display = 'block';
            document.getElementById('totp-code').value = '';
        }

        // Tự format thẻ OTP cách xa nhau
        document.getElementById('totp-code').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, ''); // chỉ cho nhập số
        });
    </script>

</body>
</html>
